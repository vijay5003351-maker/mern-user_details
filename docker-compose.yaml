services:

  server_services:
    build: ./server
    container_name: server_services
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"


  client_services:
    build: ./client
    container_name: client_services
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    depends_on:
      - server_services

