services:
  server_services:
    build: ./server
    container_name: server_services
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
      
  frontend:
    build: 
      context: ./client
      args:
        VITE_APP_API_URL: http://40.192.1.95:5000/api 
    container_name: client_services
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server_services

